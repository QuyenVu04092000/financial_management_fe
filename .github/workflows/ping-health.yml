name: Ping health

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call /health
        env:
          HEALTH_URL: ${{ secrets.HEALTH_URL }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "::warning::HEALTH_URL secret is not set. Skipping health ping. Add it in Settings → Secrets and variables → Actions to enable."
            exit 0
          fi
          echo "Pinging $HEALTH_URL ..."
          curl -fsS --retry 3 --retry-all-errors --connect-timeout 5 --max-time 20 "$HEALTH_URL"
          echo ""
          echo "Health check passed."
        continue-on-error: false
