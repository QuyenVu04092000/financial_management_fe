name: Ping health

on:
  schedule:
    - cron: "*/14 * * * *" # every 14 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call /health
        env:
          HEALTH_URL: ${{ secrets.HEALTH_URL }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "::warning::HEALTH_URL secret is not set. Skipping health ping. Add it in Settings → Secrets and variables → Actions to enable."
            exit 0
          fi
          echo "Pinging health endpoint ..."
          if ! curl -fsS --retry 1 --connect-timeout 5 --max-time 20 "$HEALTH_URL"; then
            echo "::error::Health check failed. A 404 usually means HEALTH_URL is wrong or the app has no /health route. Fix the URL in Settings → Secrets (HEALTH_URL) or add a health endpoint."
            exit 1
          fi
          echo ""
          echo "Health check passed."
        continue-on-error: false
