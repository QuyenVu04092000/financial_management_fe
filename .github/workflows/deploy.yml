name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Add these in GitHub: repo → Settings → Secrets and variables → Actions
      # Use "Variables" for non-secret values (e.g. API base URL)
      NEXT_PUBLIC_BASE_URL_API: ${{ vars.NEXT_PUBLIC_BASE_URL_API }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci
      - run: npm run build

      # GitHub Pages serves this project under /dinotrack,
      # but Next's static export links the manifest as "/manifest.webmanifest".
      # Rewrite the manifest href so browsers load it from the correct sub-path.
      - name: Rewrite manifest link for GitHub Pages base path
        run: |
          find out -name "*.html" -exec \
            sed -i 's|href="/manifest.webmanifest"|href="/dinotrack/manifest.webmanifest"|g' {} +

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
